name: Generate Contribution Snake

on:
  # Run every 24 hours so the snake stays in sync with new contributions
  schedule:
    - cron: "0 */24 * * *"

  # Allow manual triggering from the Actions tab
  workflow_dispatch:

  # Regenerate on every push to main so it updates immediately when you commit
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: George1014
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
